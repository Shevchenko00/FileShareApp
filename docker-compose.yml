
services:
  paste_app_backend:
    build:
      context: ./backend
    container_name: paste_app_backend
    volumes:
      - ./backend:/app
    ports:
      - "2222:2222"
    working_dir: /app
    depends_on:
      paste_app_postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 2222 --reload" 

  paste_app_postgres:
    image: postgres:15
    container_name: paste_app_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: paste_app_postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  paste_app_frontend:
    build:
      context: ./frontend
    container_name: paste_app_frontend
    restart: unless-stopped
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - paste_app_backend


volumes:
  postgres_data: